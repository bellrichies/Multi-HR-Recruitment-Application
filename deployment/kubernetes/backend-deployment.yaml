apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: multi-hr
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/your-org/multi-hr-backend:latest
          ports:
            - containerPort: 80
          envFrom:
            - configMapRef:
                name: multi-hr-config
            - secretRef:
                name: multi-hr-secrets
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: multi-hr
spec:
  selector:
    app: backend
  ports:
    - port: 80
      targetPort: 80
