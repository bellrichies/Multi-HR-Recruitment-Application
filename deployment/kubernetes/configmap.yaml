apiVersion: v1
kind: ConfigMap
metadata:
  name: multi-hr-config
  namespace: multi-hr
data:
  APP_ENV: production
  APP_DEBUG: "false"
  APP_URL: https://api.example.com
  DB_CONNECTION: mysql
  DB_PORT: "3306"
  DB_DATABASE: multi_hr
  DB_CHARSET: utf8mb4
  CACHE_DRIVER: file
  QUEUE_DRIVER: database
  DASHBOARD_CACHE_TTL: "60"
