apiVersion: v1
kind: Secret
metadata:
  name: multi-hr-secrets
  namespace: multi-hr
type: Opaque
stringData:
  DB_HOST: mysql.example.internal
  DB_USERNAME: multi_hr
  DB_PASSWORD: replace-with-secure-password
  JWT_SECRET: replace-with-long-random-secret
  PAYSTACK_SECRET_KEY: replace-with-paystack-secret
  PAYSTACK_WEBHOOK_SECRET: replace-with-webhook-secret
  MAIL_HOST: smtp.example.com
  MAIL_USERNAME: replace-with-mail-user
  MAIL_PASSWORD: replace-with-mail-password
